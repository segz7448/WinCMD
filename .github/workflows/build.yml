name: Build WinCMD APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Manual trigger button in GitHub UI

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Grant execute permission to gradlew
      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      # 4. Cache Gradle dependencies
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Build Debug APK (always built, no signing needed)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 6. Build Release APK (unsigned — sign with jarsigner if you add keystore)
      - name: Build Release APK (unsigned)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # 7. Sign Release APK with a generated keystore (no PC needed)
      #    To use your own keystore: add KEYSTORE_BASE64, KEY_ALIAS,
      #    KEY_PASSWORD, STORE_PASSWORD as GitHub Secrets.
      - name: Sign Release APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore
            ${JAVA_HOME}/bin/jarsigner \
              -verbose \
              -sigalg SHA1withRSA \
              -digestalg SHA1 \
              -keystore release.keystore \
              -storepass "$STORE_PASSWORD" \
              -keypass "$KEY_PASSWORD" \
              app/build/outputs/apk/release/app-release-unsigned.apk \
              "$KEY_ALIAS"
            mv app/build/outputs/apk/release/app-release-unsigned.apk \
               app/build/outputs/apk/release/WinCMD-release.apk
            echo "Signed release APK ready"
          else
            echo "No keystore secrets found — skipping signing. Debug APK is ready to install."
          fi

      # 8. Rename Debug APK nicely
      - name: Rename Debug APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/WinCMD-debug.apk

      # 9. Upload Debug APK as artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WinCMD-debug-apk
          path: app/build/outputs/apk/debug/WinCMD-debug.apk
          retention-days: 30

      # 10. Upload Release APK as artifact (signed or unsigned)
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WinCMD-release-apk
          path: |
            app/build/outputs/apk/release/WinCMD-release.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
          if-no-files-found: ignore

      # 11. Create GitHub Release on version tags (e.g. push tag v1.0.0)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/WinCMD-debug.apk
            app/build/outputs/apk/release/WinCMD-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
